name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build app
        run: ./scripts/buildprod.sh
      # Step 1: Login to Google Cloud
      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      # Step 2: Install the gcloud CLI
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"
        with:
          install_components: "gke-gcloud-auth-plugin" # Optional: only if you plan to use Kubernetes later

      - name: "Build and Push to GCP"
        run: |
          gcloud builds submit --tag us-central1-docker.pkg.dev/project-9d85dc07-aae8-4fd3-8f7/notely-ar-repo/notely:latest .

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run Migrations
        run: ./scripts/migrateup.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/project-9d85dc07-aae8-4fd3-8f7/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project project-9d85dc07-aae8-4fd3-8f7 \
            --max-instances=4